<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm khách hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h1 class="mb-4">Thêm khách hàng</h1>

<form th:action="@{/clients}" th:object="${client}" method="post" class="needs-validation" novalidate>

    <div class="mb-3">
        <label class="form-label">Tên:</label>
        <input type="text" th:field="*{name}" class="form-control" required>
        <div class="invalid-feedback">
            Vui lòng nhập tên khách hàng.
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">Số điện thoại:</label>
        <input type="text" th:field="*{phone}" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Địa chỉ:</label>
        <input type="text" th:field="*{address}" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Ghi chú:</label>
        <input type="text" th:field="*{note}" class="form-control">
    </div>

    <div class="d-flex justify-content-between">

        <div>
            <a th:href="@{/reception/search-client}" class="btn btn-secondary me-2">Quay lại Trang tìm kiếm</a>
        </div>
        <button type="submit" class="btn btn-primary">Lưu</button>
    </div>

</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Bootstrap form validation
    (() => {
        'use strict';
        const forms = document.querySelectorAll('.needs-validation');
        Array.from(forms).forEach(form => {
            form.addEventListener('submit', event => {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        });
    })();
</script>

</body>
</html>
