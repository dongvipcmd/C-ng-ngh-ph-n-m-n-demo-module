<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #e2e8f0, #f8fafc);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        .login-card {
            width: 360px;
            padding: 35px;
            border-radius: 18px;
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            animation: fadeIn 0.6s ease-in-out;
        }

        .login-title {
            text-align: center;
            font-weight: 600;
            margin-bottom: 25px;
            color: #1e293b;
        }

        .form-control {
            border-radius: 12px;
            padding: 10px;
        }

        .form-control:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 5px rgba(59,130,246,0.3);
        }

        .btn-login {
            width: 100%;
            border-radius: 12px;
            padding: 10px;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
        }

        .alert {
            border-radius: 10px;
            font-size: 14px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

</head>

<body>

<div class="login-card">
    <h3 class="login-title">Đăng nhập hệ thống</h3>

    <form th:action="@{/do-login}" method="post">
        <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="Tên đăng nhập" required>
        </div>

        <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="Mật khẩu" required>
        </div>

        <button class="btn btn-primary btn-login">Đăng nhập</button>
    </form>

    <div th:if="${param.error}" class="alert alert-danger mt-3 text-center">
        Sai tài khoản hoặc mật khẩu
    </div>

    <div th:if="${param.logout}" class="alert alert-success mt-3 text-center">
        Đăng xuất thành công
    </div>

</div>

</body>
</html>
