<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thêm xe mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2 class="mb-4">Thêm xe mới</h2>

<form th:action="@{/reception/add-car}" method="post" class="card p-4 shadow-sm">

    <!-- Giữ clientId -->
    <input type="hidden" name="clientId" th:value="${clientId}">

    <div class="mb-3">
        <label for="name" class="form-label">Tên xe</label>
        <input type="text" id="name" name="name" class="form-control" required>
    </div>

    <div class="mb-3">
        <label for="licensePlate" class="form-label">Biển số</label>
        <input type="text" id="licensePlate" name="licensePlate" class="form-control" required>
    </div>

    <div class="mb-3">
        <label for="color" class="form-label">Màu</label>
        <input type="text" id="color" name="color" class="form-control">
    </div>

    <div class="mb-3">
        <label for="brand" class="form-label">Hãng xe</label>
        <input type="text" id="brand" name="brand" class="form-control">
    </div>

    <div class="d-flex justify-content-between mt-4">
        <a th:href="@{'/reception/select-client/' + ${clientId}}" class="btn btn-secondary">
            Quay lại danh sách xe
        </a>

        <button type="submit" class="btn btn-primary">
            Lưu xe
        </button>
    </div>

</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
