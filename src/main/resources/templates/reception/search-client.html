<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tìm khách hàng</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2 class="mb-4">Tìm khách hàng</h2>

<!--FORM -->
<form th:action="@{/reception/search-client}" method="post" class="mb-3">
    <div class="input-group">
        <input type="text" name="keyword"
               th:value="${keyword}"
               class="form-control"
               placeholder="Nhập tên hoặc SĐT">

        <button class="btn btn-primary" type="submit">
            Tìm
        </button>
    </div>
</form>

<!--NÚT THÊM KHÁCH -->
<a th:href="@{/clients/create}">
    <button class="btn btn-success mb-3">
        Thêm khách hàng
    </button>
</a>

<hr>

<!-- 📋 DANH SÁCH KHÁCH -->
<div th:if="${clients != null}">
    <h5>Danh sách khách hàng</h5>

    <table class="table table-bordered table-hover mt-2">
        <thead class="table-light">
        <tr>
            <th>Tên</th>
            <th>SĐT</th>
            <th>Chọn</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="c : ${clients}">
            <td th:text="${c.name}"></td>
            <td th:text="${c.phone}"></td>
            <td>
                <a th:href="@{'/reception/select-client/' + ${c.id}}"
                   class="btn btn-sm btn-primary">
                    Chọn
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<!-- ================= POPUP LỖI ================= -->
<div class="modal fade" id="errorModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title text-danger">Thông báo</h5>
            </div>

            <div class="modal-body">
                <p th:text="${error}"></p>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-primary" id="okBtn">
                    OK
                </button>
            </div>

        </div>
    </div>
</div>

<!--Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!--HIỂN THỊ POPUP -->
<script th:if="${error}">
    document.addEventListener("DOMContentLoaded", function () {
        var modal = new bootstrap.Modal(document.getElementById('errorModal'));
        modal.show();

        document.getElementById("okBtn").addEventListener("click", function () {
            window.location.href = "/reception/search-client";
        });
    });
</script>

</body>
</html>
