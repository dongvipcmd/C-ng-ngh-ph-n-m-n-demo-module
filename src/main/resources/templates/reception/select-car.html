<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chọn xe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2 class="mb-4">Danh sách xe của khách</h2>

<div class="table-responsive">
    <table class="table table-bordered table-striped align-middle">
        <thead class="table-dark">
        <tr>
            <th>Tên xe</th>
            <th>Biển số</th>
            <th>Màu</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="car : ${cars}">
            <td th:text="${car.name}"></td>
            <td th:text="${car.licensePlate}"></td>
            <td th:text="${car.color}"></td>
            <td>
                <a th:href="@{'/reception/orders/create/' + ${car.id}}" class="btn btn-success btn-sm">
                    Tạo phiếu tiếp nhận
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div class="mt-3">

    <a th:href="@{'/reception/search-client'}" class="btn btn-secondary ms-2">
        Quay lại
    </a>

    <a th:href="@{'/reception/add-car/' + ${clientId}}" class="btn btn-primary">
        Thêm xe mới
    </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
