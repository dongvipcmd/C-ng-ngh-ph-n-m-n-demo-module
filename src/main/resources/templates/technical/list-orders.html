<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách phiếu sửa chữa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2 class="mb-4">Danh sách phiếu sửa chữa</h2>

<div class="table-responsive">
    <table class="table table-bordered table-striped align-middle">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Biển số</th>
            <th>Mô tả</th>
            <th>Ngày nhận</th>
            <th>Trạng thái</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="o : ${orders}">
            <td th:text="${o.id}"></td>
            <td th:text="${o.car.licensePlate}"></td>
            <td th:text="${o.description}"></td>
            <td th:text="${#temporals.format(o.receivedDate, 'dd/MM/yyyy HH:mm')}"></td>
            <td th:text="${o.status}"></td>
            <td>
                <a th:href="@{'/technical/orders/orders-detail/' + ${o.id}}" class="btn btn-info btn-sm">
                    Xem chi tiết phiếu
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
