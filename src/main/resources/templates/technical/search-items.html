<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thêm dịch vụ / phụ tùng</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="container mt-4">

<h2>Thêm dịch vụ / phụ tùng</h2>

<!-- THÔNG BÁO THÀNH CÔNG -->
<div th:if="${success}" class="alert alert-success">
    <span th:text="${success}"></span>
</div>

<!-- SEARCH -->
<form th:action="@{'/technical/' + ${orderId} + '/search'}" method="get" class="mb-4">
    <div class="input-group">
        <input type="text" name="keyword" class="form-control"
               placeholder="Nhập tên dịch vụ hoặc phụ tùng..."
               th:value="${keyword}">
        <button class="btn btn-primary">Tìm kiếm</button>
    </div>
</form>

<hr>

<!-- SERVICE -->
<div th:if="${services != null and !#lists.isEmpty(services)}">
    <h4>Dịch vụ</h4>
    <table class="table table-bordered">
        <thead class="table-dark">
        <tr>
            <th>Tên</th>
            <th>Giá</th>
            <th>Chọn</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="s : ${services}">
            <td th:text="${s.name}"></td>
            <td th:text="${#numbers.formatDecimal(s.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
            <td>
                <form th:action="@{'/technical/' + ${orderId} + '/add-item'}" method="post" class="d-flex">
                    <input type="hidden" name="itemId" th:value="${s.id}">
                    <input type="hidden" name="type" value="SERVICE">
                    <input type="number" name="quantity" value="1" min="1" class="form-control me-2" style="width:80px">
                    <button class="btn btn-success btn-sm">Chọn</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<!-- PART -->
<div th:if="${parts != null and !#lists.isEmpty(parts)}">
    <h4>Phụ tùng</h4>
    <table class="table table-bordered">
        <thead class="table-dark">
        <tr>
            <th>Tên</th>
            <th>Giá</th>
            <th>Chọn</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${parts}">
            <td th:text="${p.name}"></td>
            <td th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
            <td>
                <form th:action="@{'/technical/' + ${orderId} + '/add-item'}" method="post" class="d-flex">
                    <input type="hidden" name="itemId" th:value="${p.id}">
                    <input type="hidden" name="type" value="PART">
                    <input type="number" name="quantity" value="1" min="1" class="form-control me-2" style="width:80px">
                    <button class="btn btn-success btn-sm">Chọn</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div class="d-flex justify-content-end mt-4">
    <form th:action="@{'/technical/' + ${orderId} + '/finalize'}" method="post">
        <button class="btn btn-success btn-sm">Xác nhận hoàn tất</button>
    </form>
</div>



<!-- POPUP THÔNG BÁO KHÔNG TÌM THẤY -->
<div class="modal fade" id="errorModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title text-danger">Thông báo</h5>
            </div>

            <div class="modal-body">
                <p th:text="${error}"></p>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-primary" id="okBtn">OK</button>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- HIỂN THỊ POPUP NẾU ERROR -->
<script th:if="${error}">
    document.addEventListener("DOMContentLoaded", function () {
        var modal = new bootstrap.Modal(document.getElementById('errorModal'));
        modal.show();

        document.getElementById("okBtn").addEventListener("click", function () {
            window.location.href = "/technical/" + [[${orderId}]] + "/items";
        });
    });
</script>

</body>
</html>
